app = "haworks-ai"
primary_region = "iad"

[build]
  dockerfile = "src/Ai/Dockerfile"
  [build.args]

[env]
  AI_SERVICE_NAME = "ai-svc"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "30s"
  interval = "15s"
  method = "GET"
  path = "/health/ready"
  timeout = "5s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 2

[deploy]
  strategy = "rolling"
  release_command = "python -m alembic upgrade head"
