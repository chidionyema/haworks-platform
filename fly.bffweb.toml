# Per-service fly.toml. Deploy from the repo root with:
#   flyctl deploy -c fly.bffweb.toml
# Build context = repo root, so the Dockerfile can pull in Directory.Build.props
# and the shared BuildingBlocks/Contracts projects.

app            = "ritualworks-bffweb"
primary_region = "iad"

[build]
  dockerfile = "src/BffWeb/BffWeb.Api/Dockerfile"

[env]
  ASPNETCORE_URLS        = "http://+:8080"
  ASPNETCORE_ENVIRONMENT = "Production"

  # Microsoft.Extensions.ServiceDiscovery overrides for the BFF's HttpClients.
  # Keys must match BackendClients.cs constants exactly (the hyphenated names
  # are intentional). These live here, not in `flyctl secrets`, because Fly's
  # secrets API rejects hyphens in names — and these aren't secrets anyway,
  # just internal flycast hostnames.
  "Services__identity-svc__http__0"  = "http://ritualworks-identity.flycast:8080"
  "Services__catalog-svc__http__0"   = "http://ritualworks-catalog.flycast:8080"
  "Services__orders-svc__http__0"    = "http://ritualworks-orders.flycast:8080"
  "Services__payments-svc__http__0"  = "http://ritualworks-payments.flycast:8080"
  "Services__checkout-svc__http__0"  = "http://ritualworks-checkout.flycast:8080"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes           = ["app"]

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
