# Per-service fly.toml. Deploy from the repo root with:
#   flyctl deploy -c fly.bffweb.toml
# Build context = repo root, so the Dockerfile can pull in Directory.Build.props
# and the shared BuildingBlocks/Contracts projects.

app            = "ritualworks-bffweb"
primary_region = "iad"

[build]
  dockerfile = "src/BffWeb/BffWeb.Api/Dockerfile"

[env]
  ASPNETCORE_URLS        = "http://+:8080"
  ASPNETCORE_ENVIRONMENT = "Production"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes           = ["app"]

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
