app            = "haworks-webhooks"
primary_region = "iad"

[build]
  dockerfile = "src/Webhooks/Webhooks.Api/Dockerfile"

[env]
  ASPNETCORE_URLS = "http://+:8080"
  OTEL_SERVICE_NAME         = "webhooks-svc"
  OTEL_RESOURCE_ATTRIBUTES  = "deployment.environment=production,service.namespace=haworks"
  # Vault is NOT integrated in Webhooks service code (no AddVaultIntegration
  # call). DB credentials come from bootstrap.sh static connection string.
  # Vault__Enabled, Address, and path config removed — they were leftover
  # from a template copy and the service has no AppRole in services.json.

[http_service]
  internal_port        = 8080
  force_https          = false
  auto_stop_machines   = "off"
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]


  [[http_service.checks]]
    interval     = "10s"
    timeout      = "5s"
    grace_period = "30s"
    method       = "GET"
    path         = "/health/ready"
[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
