              labels: ['synthetic-monitor', 'incident']
            });

  identity:
    name: Identity Monitor
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Run every 15 minutes — auth is critical path for everything
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(fromJSON('["0","15","30","45"]'), formatDate(github.event.schedule, 'mm'))
