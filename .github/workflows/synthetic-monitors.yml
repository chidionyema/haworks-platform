              body: `## Identity Monitor Failure\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n\`\`\`\n${output}\n\`\`\``,
              labels: ['synthetic-monitor', 'incident']
            });

  notification:
    name: Notification Monitor
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Run every 15 minutes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(fromJSON('["0","15","30","45"]'), formatDate(github.event.schedule, 'mm'))
    steps:
      - uses: actions/checkout@v4

      - name: Run notification monitor
        run: |
          chmod +x tests/synthetic/notification-monitor.sh
