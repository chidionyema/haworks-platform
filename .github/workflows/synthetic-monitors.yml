        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/identity-output.txt', 'utf8');
            const title = `[Synthetic Monitor] Identity failure — ${new Date().toISOString().slice(0,16)}Z`;
            await github.rest.issues.create({
              owner: context.repo.owner,
