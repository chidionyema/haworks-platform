name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs on PRs (rapid iteration). On main, let runs
# complete so integration suites aren't killed by back-to-back pushes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  HAWORKS_ANALYZERS: true
  # MSBuild parallelism — use all available cores (GitHub runners have 4)
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: true
  # Enforce the same regex timeout fix the per-assembly module init applies
  # locally — belt-and-braces in case CI's Testcontainers tag matching is
  # subject to the same backtracking.
  TESTCONTAINERS_RYUK_DISABLED: true

jobs:
  # Fast path — builds the solution and runs everything that doesn't need
  # Docker. Fails the PR in <2 minutes if the build, unit, architecture,
  # or Pact tests are broken.
  build-and-fast-tests:
    name: Build + unit/arch/contract
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Architecture guards
        run: bash scripts/check-architecture.sh

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore
        run: dotnet restore HaworksPlatform.sln

      - name: Build (no restore)
        run: dotnet build HaworksPlatform.sln --no-restore --configuration Release -m

      - name: Migration drift check
        run: |
          dotnet tool restore
          bash scripts/check-migration-drift.sh

      - name: Unit + Architecture + Contract tests with coverage
        run: |
          dotnet test HaworksPlatform.sln \
            --no-build --configuration Release \
            --filter "FullyQualifiedName!~Integration&FullyQualifiedName!~E2E&FullyQualifiedName!~Smoke" \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=minimal" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Generate coverage report
        if: always()
        continue-on-error: true
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool 2>/dev/null || true
          if ls TestResults/**/coverage.cobertura.xml 1>/dev/null 2>&1; then
            reportgenerator \
              -reports:"TestResults/**/coverage.cobertura.xml" \
              -targetdir:TestResults/CoverageReport \
              -reporttypes:"Cobertura;TextSummary"
            echo "### Test Coverage" >> $GITHUB_STEP_SUMMARY
            cat TestResults/CoverageReport/Summary.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "### Test Coverage" >> $GITHUB_STEP_SUMMARY
            echo "No coverage data generated (tests may have failed)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: TestResults/**/coverage.cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fast-test-results
          path: |
            **/TestResults/*.trx
            TestResults/CoverageReport/
          retention-days: 7

  # ── AI Service (Python) — independent of .NET build ──
  ai-service-tests:
    name: AI Service (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: []

    defaults:
      run:
        working-directory: src/Ai

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv pip install --system .
          uv pip install --system pytest pytest-asyncio pytest-cov httpx respx

      - name: Run unit tests
        env:
          AI_ANTHROPIC_API_KEY: "test-key-not-real"
        run: python -m pytest tests/unit -v

  # Slow path — Testcontainers integration tests. One job per service so a
  # flake in one suite doesn't block the others, and so per-service timing
  # is visible at a glance.
  integration-tests:
    name: Integration / ${{ matrix.suite }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-and-fast-tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: Catalog
            path: tests/Catalog/Catalog.Integration
          - suite: Orders
            path: tests/Orders/Orders.Integration
          - suite: Payments
            path: tests/Payments/Payments.Integration
          - suite: Identity
            path: tests/Identity/Identity.Integration
          - suite: BffWeb
            path: tests/BffWeb/BffWeb.Integration
          - suite: CheckoutOrchestrator
            path: tests/CheckoutOrchestrator/CheckoutOrchestrator.Integration
          - suite: Search
            path: tests/Search/Search.Integration
          - suite: Audit
            path: tests/Audit/Audit.Integration
          - suite: Notifications
            path: tests/Notifications/Notifications.Integration
          # Webhooks excluded — Svix container takes 20+ min to start in CI.
          # Run locally or via: gh workflow run CI && filter Webhooks
          - suite: Payouts
            path: tests/Payouts/Payouts.Integration
          - suite: Scheduler
            path: tests/Scheduler/Scheduler.Integration

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      # Linux runners have Docker pre-installed and dockerd running. The
      # default socket lives at /var/run/docker.sock — same as the override
      # the local test module init falls back to. Confirm it's reachable
      # before kicking off the suite so a Docker outage shows up here, not
      # buried in a Testcontainers stack trace 5 minutes in.
      - name: Verify Docker
        run: docker info

      # Cache the Docker images Testcontainers pulls on every run so we
      # don't burn 10-30s pulling them from Docker Hub each invocation.
      # Key is pinned to the exact image tags — bumping a tag invalidates
      # the cache automatically. Both images are saved together because
      # actions/cache requires a single path tree; the meili tarball is
      # ~150MB compressed which is well within the 10GB cache budget.
      - name: Cache Docker test images
        id: docker-image-cache
        uses: actions/cache@v5
        with:
          path: /tmp/docker-images
          key: docker-images-${{ runner.os }}-pg16-es8.17-kafka7.6-rabbit3

      - name: Load cached Docker images
        if: steps.docker-image-cache.outputs.cache-hit == 'true'
        run: |
          for f in /tmp/docker-images/*.tar; do docker load -i "$f"; done

      - name: Pull and save images for cache
        if: steps.docker-image-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/docker-images
          images=(
            postgres:16-alpine
            docker.elastic.co/elasticsearch/elasticsearch:8.17.0
            confluentinc/cp-kafka:7.6.1
            rabbitmq:3-management
          )
          for img in "${images[@]}"; do
            docker pull "$img"
            docker save "$img" -o "/tmp/docker-images/$(echo "$img" | tr '/:' '-').tar"
          done

      - name: Restore + build ${{ matrix.suite }}.Integration
        run: |
          dotnet restore ${{ matrix.path }}/${{ matrix.suite }}.Integration.csproj
          dotnet build ${{ matrix.path }}/${{ matrix.suite }}.Integration.csproj --no-restore --configuration Release

      - name: Run ${{ matrix.suite }}.Integration
        run: |
          dotnet test ${{ matrix.path }}/${{ matrix.suite }}.Integration.csproj \
            --no-build --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=normal"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results-${{ matrix.suite }}
          path: '**/TestResults/*.trx'
          retention-days: 7

  # Smoke tests moved to deploy.yml (post-deploy-smoke job) — they run
  # against the live Fly.io deployment, not the Aspire AppHost in CI.
